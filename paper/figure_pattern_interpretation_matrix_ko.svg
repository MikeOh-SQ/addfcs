<svg width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">다층적 패턴 해석 원리</title>
  <desc id="desc">자기보고 또는 증상 구조화 결과와 행동과제 결과의 일치 및 불일치 패턴을 설명하는 두 행 두 열 학술용 매트릭스.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: "Noto Sans CJK KR", "Noto Sans KR", Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #111111; }
      .axis-title { font-family: "Noto Sans CJK KR", "Noto Sans KR", Arial, Helvetica, sans-serif; font-size: 23px; font-weight: 700; fill: #111111; }
      .axis-label { font-family: "Noto Sans CJK KR", "Noto Sans KR", Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; fill: #222222; }
      .quad-title { font-family: "Noto Sans CJK KR", "Noto Sans KR", Arial, Helvetica, sans-serif; font-size: 21px; font-weight: 700; fill: #111111; }
      .body { font-family: "Noto Sans CJK KR", "Noto Sans KR", Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 400; fill: #333333; }
      .recommend { font-family: "Noto Sans CJK KR", "Noto Sans KR", Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; fill: #1f4e5f; }
      .note { font-family: "Noto Sans CJK KR", "Noto Sans KR", Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 500; fill: #222222; }
      .matrix-border { fill: none; stroke: #222222; stroke-width: 2; }
      .grid-line { stroke: #666666; stroke-width: 1.5; }
      .cell-neutral { fill: #fbfbfb; }
      .cell-accent { fill: #f4f7f8; }
      .cell-soft { fill: #f8f8f8; }
      .note-box { fill: #ffffff; stroke: #777777; stroke-width: 1.2; rx: 6; }
      .small-line { stroke: #d4d4d4; stroke-width: 1; }
      .tag { fill: #ffffff; stroke: #1f4e5f; stroke-width: 1.2; rx: 12; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1120"/>
  <text class="title" x="800" y="74" text-anchor="middle">다층적 패턴 해석 원리</text>
  <line class="small-line" x1="90" y1="122" x2="1510" y2="122"/>

  <text class="axis-title" x="900" y="164" text-anchor="middle">행동과제 결과</text>
  <text class="axis-label" x="620" y="206" text-anchor="middle">안정적</text>
  <text class="axis-label" x="1180" y="206" text-anchor="middle">불안정성 관찰</text>

  <g transform="translate(112,610) rotate(-90)">
    <text class="axis-title" x="0" y="0" text-anchor="middle">자기보고 / 증상 구조화</text>
  </g>
  <text class="axis-label" x="245" y="378" text-anchor="middle">높은 어려움</text>
  <text class="axis-label" x="245" y="790" text-anchor="middle">낮은 어려움</text>

  <rect class="cell-soft" x="340" y="240" width="560" height="330"/>
  <rect class="cell-accent" x="900" y="240" width="560" height="330"/>
  <rect class="cell-neutral" x="340" y="570" width="560" height="330"/>
  <rect class="cell-soft" x="900" y="570" width="560" height="330"/>
  <rect class="matrix-border" x="340" y="240" width="1120" height="660"/>
  <line class="grid-line" x1="900" y1="240" x2="900" y2="900"/>
  <line class="grid-line" x1="340" y1="570" x2="1460" y2="570"/>

  <rect class="tag" x="370" y="266" width="96" height="34"/>
  <text class="recommend" x="418" y="289" text-anchor="middle">불일치</text>
  <text class="quad-title" x="370" y="340">주관적 어려움 우세 패턴</text>
  <text class="body" x="370" y="405">일상 어려움은 높지만 구조화 과제 수행은 비교적 안정적</text>
  <text class="recommend" x="370" y="500">생활 맥락과 기능 손상 확인 필요</text>

  <rect class="tag" x="930" y="266" width="80" height="34"/>
  <text class="recommend" x="970" y="289" text-anchor="middle">수렴</text>
  <text class="quad-title" x="930" y="340">수렴형 어려움 패턴</text>
  <text class="body" x="930" y="405">주관적 어려움과 수행 불안정성이 같은 방향으로 관찰됨</text>
  <text class="recommend" x="930" y="500">추가 평가가 도움이 될 수 있음</text>

  <rect class="tag" x="370" y="596" width="112" height="34"/>
  <text class="recommend" x="426" y="619" text-anchor="middle">낮은 신호</text>
  <text class="quad-title" x="370" y="670">낮은 신호 패턴</text>
  <text class="body" x="370" y="735">자기보고와 행동과제 모두에서 두드러진 어려움이 낮게 관찰됨</text>
  <text class="recommend" x="370" y="830">단정하지 말고 필요 시 맥락 정보 확인</text>

  <rect class="tag" x="930" y="596" width="96" height="34"/>
  <text class="recommend" x="978" y="619" text-anchor="middle">불일치</text>
  <text class="quad-title" x="930" y="670">수행 불안정성 우세 패턴</text>
  <text class="body" x="930" y="735">자기보고는 낮지만 과제 수행에서 불안정성이 관찰됨</text>
  <text class="recommend" x="930" y="830">수면, 피로, 기기 환경, 과제 이해도 확인 필요</text>

  <rect class="note-box" x="130" y="970" width="1340" height="88"/>
  <text class="note" x="800" y="1020" text-anchor="middle">이 매트릭스는 주의력결핍 과잉행동장애 진단이 아니라 선별 및 자기이해 보조를 위한 해석 구조이다.</text>
</svg>
